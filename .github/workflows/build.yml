name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Restore cached dependency libs
        uses: actions/cache/restore@v4
        id: libs-cache
        with:
          path: libs
          key: lleisure-libs-${{ hashFiles('libs/README.md') }}
          restore-keys: |
            lleisure-libs-

      - name: Download build dependency libs
        if: steps.libs-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p libs
          if [[ -f libs/gtceu-1.20.1-1.4.4.jar ]]; then
            exit 0
          fi
          gh release download build-dependencies --repo "${{ github.repository }}" --pattern 'libs.zip' --dir .
          unzip -o libs.zip -d libs
          rm -f libs.zip

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace
